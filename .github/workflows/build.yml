name: Build Multi-Platform Artifacts

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: [sabalong-runner2]
    strategy:
      matrix:
        arch: [amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build DuckDB and App (Linux amd64)
        run: |
          chmod +x scripts/build_multi_platform.sh
          ./scripts/build_multi_platform.sh

      - name: Upload Linux amd64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fincent-api-linux-amd64
          path: ./artifacts/fincent-api-linux-amd64

      - name: Upload Linux amd64 Static Libraries
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-static-libs-linux-amd64
          path: ./artifacts/duckdb-static-libs-linux-amd64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.5'

      - name: Install Dependencies
        run: |
          brew install cmake git python3

      - name: Build DuckDB and App (macOS arm64)
        run: |
          chmod +x scripts/build_multi_platform.sh
          ./scripts/build_multi_platform.sh

      - name: Upload macOS arm64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fincent-api-macos-arm64
          path: ./artifacts/fincent-api-macos-arm64

      - name: Upload macOS arm64 Static Libraries
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-static-libs-macos-arm64
          path: ./artifacts/duckdb-static-libs-macos-arm64.zip

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            fincent-api-linux-amd64/fincent-api-linux-amd64
            fincent-api-macos-arm64/fincent-api-macos-arm64
            duckdb-static-libs-linux-amd64/duckdb-static-libs-linux-amd64.zip
            duckdb-static-libs-macos-arm64/duckdb-static-libs-macos-arm64.zip
